version: '3.8'

services:
  mongodb:
    image: mongo:8.2
    container_name: iot_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: iot_mqtt
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping", "-u", "${MQTT_USER}", "-P", "${MQTT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    container_name: telegram_bot
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodb_data:
  mosquitto_data:
  mosquitto_log: